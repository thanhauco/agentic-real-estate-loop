name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Smoke-test examples (offline mock mode)
        run: |
          python examples/run_phase1.py
          python examples/run_phase2_loops.py
          python examples/run_broker_session.py

      - name: Smoke-test CLI entry point
        run: realestate --once 'Find me a $700k investment house near Seattle' --no-persist

      - name: Smoke-test web entry point
        run: python -c "from real_estate_loop.web.server import run, _STATIC_DIR; assert (_STATIC_DIR / 'index.html').is_file(); print('web ok')"
